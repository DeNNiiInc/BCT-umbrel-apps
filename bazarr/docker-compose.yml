version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: bazarr_server_1
      APP_PORT: 6767
      APP_HOST: bazarr_server_2
      APP_PORT: 7767
      PROXY_AUTH_WHITELIST: "/api/*"
      PROXY_AUTH_ADD: 'false'

  server:
    image: linuxserver/bazarr:1.5.3@sha256:e424330f048ff1401f22413e34ee11c25ac2de79b6213c6ead3f593b44626c55
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
      - ${UMBREL_ROOT}/network/SYN.local/SHARE/DOWNLOADS/TEMP:/volume1/SHARE/DOWNLOADS/TEMP
      - ${UMBREL_ROOT}/network/SYN.local/SHARE/MOVIES:/volume1/SHARE/MOVIES
      - ${UMBREL_ROOT}/network/SYN.local/SHARE/ANIME:/volume1/SHARE/ANIME
      - ${UMBREL_ROOT}/network/SYN.local/SHARE/EPISODES:/volume1/SHARE/EPISODES
    restart: on-failure
